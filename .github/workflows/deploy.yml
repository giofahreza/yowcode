name: Deploy Release Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye  # Debian 11 with GLIBC 2.31 for compatibility
    env:
      RUST_VERSION: "stable"
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl pkg-config libssl-dev

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI artifact
        run: |
          set -euo pipefail
          cargo build --release --bin yow
          # Rename binary to yowcode for backward compatibility
          cp target/release/yow target/release/yowcode
          tar -C target/release -czf yowcode-${{ github.ref_name }}-linux-amd64.tar.gz yowcode
          sha256sum yowcode-${{ github.ref_name }}-linux-amd64.tar.gz > yowcode-${{ github.ref_name }}-linux-amd64.tar.gz.sha256

      - name: Build Web artifact
        run: |
          set -euo pipefail
          cargo build --release --bin yowcode-web
          tar -C target/release -czf yowcode-web-${{ github.ref_name }}-linux-amd64.tar.gz yowcode-web
          sha256sum yowcode-web-${{ github.ref_name }}-linux-amd64.tar.gz > yowcode-web-${{ github.ref_name }}-linux-amd64.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yowcode-binaries
          path: |
            yowcode-*.tar.gz
            yowcode-*.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            yowcode-*.tar.gz
            yowcode-*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deployment job - only runs if we can connect to the server
  # Skip ZeroTier and try direct SSH first
  deploy-cli:
    runs-on: ubuntu-latest
    needs: build
    env:
      COMPONENT: "cli"
      ARTIFACT_NAME: yowcode-${{ github.ref_name }}-linux-amd64.tar.gz
      ARTIFACT_SHA256: yowcode-${{ github.ref_name }}-linux-amd64.tar.gz.sha256
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yowcode-binaries

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy.key
          chmod 600 ~/.ssh/deploy.key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy.key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "install -d -m 700 ~/uploads"
          scp -i ~/.ssh/deploy.key -P "${{ secrets.DEPLOY_PORT }}" "$ARTIFACT_NAME" "$ARTIFACT_SHA256" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/uploads/"

      - name: Deploy on target host
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy.key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/yowcode-deploy \
              --artifact /home/${{ secrets.DEPLOY_USER }}/uploads/$ARTIFACT_NAME \
              --sha256-file /home/${{ secrets.DEPLOY_USER }}/uploads/$ARTIFACT_SHA256 \
              --version '${{ github.ref_name }}' \
              --component ${{ env.COMPONENT }}"

      - name: Verify remote service
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy.key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "systemctl is-active yowcode-cli.service && readlink -f /opt/yowcode/cli/current"
    continue-on-error: true  # Don't fail the whole workflow if deployment fails

  deploy-web:
    runs-on: ubuntu-latest
    needs: build
    env:
      COMPONENT: "web"
      ARTIFACT_NAME: yowcode-web-${{ github.ref_name }}-linux-amd64.tar.gz
      ARTIFACT_SHA256: yowcode-web-${{ github.ref_name }}-linux-amd64.tar.gz.sha256
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yowcode-binaries

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy.key
          chmod 600 ~/.ssh/deploy.key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy.key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "install -d -m 700 ~/uploads"
          scp -i ~/.ssh/deploy.key -P "${{ secrets.DEPLOY_PORT }}" "$ARTIFACT_NAME" "$ARTIFACT_SHA256" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/uploads/"

      - name: Deploy on target host
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy.key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/yowcode-deploy \
              --artifact /home/${{ secrets.DEPLOY_USER }}/uploads/$ARTIFACT_NAME \
              --sha256-file /home/${{ secrets.DEPLOY_USER }}/uploads/$ARTIFACT_SHA256 \
              --version '${{ github.ref_name }}' \
              --component ${{ env.COMPONENT }}"

      - name: Verify remote service
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy.key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "systemctl is-active yowcode-web.service && readlink -f /opt/yowcode/web/current"
    continue-on-error: true  # Don't fail the whole workflow if deployment fails
